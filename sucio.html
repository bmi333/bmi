<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExtinColombia | Venta y Recarga de Extintores</title>
  <meta name="description" content="Venta, recarga, mantenimiento e instalación de extintores en Colombia. Servicio para hogares, empresas, comercios, edificios, vehículos e industrias." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --red:#d71920;
      --red-dark:#9f1016;
      --yellow:#ffbf00;
      --dark:#111827;
      --gray:#6b7280;
      --light:#f8fafc;
      --white:#ffffff;
      --green:#25d366;
      --shadow:0 20px 55px rgba(17,24,39,.14);
      --radius:24px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;
      color:var(--dark);
      background:var(--light);
      overflow-x:hidden;
    }
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    .container{width:min(1180px,92%);margin:auto}

    .topbar{
      background:#0b0f19;
      color:white;
      font-size:14px;
      padding:10px 0;
    }
    .topbar .container{
      display:flex;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
      align-items:center;
    }
    .topbar span{opacity:.92}
    .topbar i{color:var(--yellow);margin-right:7px}

    header{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(15px);
      box-shadow:0 8px 25px rgba(0,0,0,.06);
    }
    nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:78px;
      gap:20px;
    }
    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
      font-size:24px;
      letter-spacing:-.7px;
    }
    .logo-icon{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(135deg,var(--red),#ff4b2b);
      color:white;display:grid;place-items:center;
      box-shadow:0 10px 25px rgba(215,25,32,.3);
    }
    .logo strong{color:var(--red)}
    .nav-links{display:flex;gap:26px;align-items:center;font-weight:700;font-size:14px;color:#374151}
    .nav-links a:hover{color:var(--red)}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:14px 22px;border-radius:999px;font-weight:800;
      transition:.25s ease;border:none;cursor:pointer;
    }
    .btn-red{background:var(--red);color:white;box-shadow:0 14px 30px rgba(215,25,32,.26)}
    .btn-red:hover{transform:translateY(-3px);background:var(--red-dark)}
    .btn-green{background:var(--green);color:white;box-shadow:0 14px 30px rgba(37,211,102,.28)}
    .btn-green:hover{transform:translateY(-3px);filter:brightness(.95)}
    .btn-outline{border:2px solid rgba(255,255,255,.7);color:white;background:rgba(255,255,255,.08)}
    .btn-outline:hover{background:white;color:var(--red)}

    .hero{
      position:relative;
      min-height:calc(100vh - 118px);
      display:flex;
      align-items:center;
      color:white;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%,rgba(255,191,0,.22),transparent 30%),
        linear-gradient(135deg,rgba(11,15,25,.95),rgba(112,12,18,.92)),
        url('https://images.unsplash.com/photo-1581093458791-9d15482442f6?auto=format&fit=crop&w=1800&q=80') center/cover;
    }
    .hero::before{
      content:"";position:absolute;inset:0;
      background:linear-gradient(90deg,rgba(0,0,0,.55),rgba(0,0,0,.12));
    }
    .hero-content{position:relative;z-index:2;display:grid;grid-template-columns:1.1fr .9fr;gap:45px;align-items:center;padding:80px 0}
    .badge{
      display:inline-flex;align-items:center;gap:10px;
      padding:9px 14px;border-radius:999px;
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
      font-weight:800;font-size:13px;margin-bottom:22px;
      animation:floatBadge 3s ease-in-out infinite;
    }
    .badge i{color:var(--yellow)}
    .hero h1{
      font-size:clamp(38px,6vw,76px);
      line-height:.95;
      letter-spacing:-2.5px;
      font-weight:900;
      margin-bottom:22px;
    }
    .hero h1 span{color:var(--yellow)}
    .hero p{
      font-size:clamp(16px,2vw,21px);
      line-height:1.7;
      color:rgba(255,255,255,.9);
      max-width:720px;
      margin-bottom:30px;
    }
    .hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:30px}
    .hero-points{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:760px}
    .hero-point{
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      padding:15px;
      backdrop-filter:blur(10px);
    }
    .hero-point b{display:block;font-size:20px;color:var(--yellow)}
    .hero-point small{color:rgba(255,255,255,.78);font-weight:600}

    .hero-card{
      background:rgba(255,255,255,.95);
      color:var(--dark);
      border-radius:32px;
      padding:28px;
      box-shadow:var(--shadow);
      position:relative;
      animation:floatCard 4s ease-in-out infinite;
    }
    .hero-card::after{
      content:"";position:absolute;right:-35px;top:-35px;width:110px;height:110px;
      background:var(--yellow);border-radius:50%;opacity:.28;filter:blur(4px);
    }
    .hero-card h3{font-size:24px;margin-bottom:8px}
    .hero-card p{color:var(--gray);font-size:15px;margin-bottom:18px;line-height:1.6}
    .quick-form{display:grid;gap:12px}
    .quick-form input,.quick-form select,.quick-form textarea{
      width:100%;border:1px solid #e5e7eb;border-radius:15px;padding:14px 15px;font-family:inherit;font-weight:600;outline:none;background:#f9fafb;
    }
    .quick-form input:focus,.quick-form select:focus,.quick-form textarea:focus{border-color:var(--red);box-shadow:0 0 0 4px rgba(215,25,32,.08)}
    .quick-form textarea{resize:none;min-height:88px}

    .section{padding:90px 0}
    .section-title{text-align:center;max-width:800px;margin:0 auto 50px}
    .section-title .mini{color:var(--red);font-weight:900;text-transform:uppercase;letter-spacing:1.5px;font-size:13px;margin-bottom:12px}
    .section-title h2{font-size:clamp(30px,4vw,48px);letter-spacing:-1.5px;line-height:1.05;margin-bottom:16px}
    .section-title p{color:var(--gray);font-size:17px;line-height:1.7}

    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .card{
      background:white;border-radius:var(--radius);padding:30px;
      box-shadow:0 12px 35px rgba(17,24,39,.08);
      border:1px solid rgba(229,231,235,.9);
      transition:.28s ease;
      position:relative;overflow:hidden;
    }
    .card:hover{transform:translateY(-9px);box-shadow:var(--shadow)}
    .card::before{content:"";position:absolute;left:0;top:0;width:100%;height:5px;background:linear-gradient(90deg,var(--red),var(--yellow))}
    .card-icon{width:58px;height:58px;border-radius:18px;background:rgba(215,25,32,.09);display:grid;place-items:center;color:var(--red);font-size:24px;margin-bottom:20px}
    .card h3{font-size:21px;margin-bottom:12px}
    .card p{color:var(--gray);line-height:1.7;margin-bottom:18px}
    .card ul{list-style:none;display:grid;gap:10px;color:#4b5563;font-weight:600}
    .card li i{color:var(--green);margin-right:8px}

    .products{background:white}
    .product-card{padding:0;overflow:hidden}
    .product-top{
      height:190px;
      background:linear-gradient(135deg,#111827,#d71920);
      display:grid;place-items:center;color:white;position:relative;
    }
    .product-top i{font-size:74px;filter:drop-shadow(0 12px 18px rgba(0,0,0,.22));animation:pulseIcon 2.5s infinite}
    .product-body{padding:28px}
    .tag{display:inline-flex;padding:7px 11px;border-radius:999px;background:#fff4d6;color:#8a5a00;font-weight:900;font-size:12px;margin-bottom:13px}
    .price{font-size:15px;color:var(--gray);margin:12px 0 18px}
    .price strong{font-size:25px;color:var(--red)}

    .split{display:grid;grid-template-columns:1fr 1fr;gap:45px;align-items:center}
    .about-box{
      background:#111827;color:white;border-radius:34px;padding:40px;position:relative;overflow:hidden;box-shadow:var(--shadow)
    }
    .about-box::after{content:"";position:absolute;width:260px;height:260px;background:rgba(255,191,0,.18);border-radius:50%;right:-100px;bottom:-90px}
    .about-box h2{font-size:clamp(30px,4vw,46px);line-height:1.1;margin-bottom:18px;position:relative;z-index:2}
    .about-box p{line-height:1.8;color:rgba(255,255,255,.82);position:relative;z-index:2}
    .check-list{display:grid;gap:15px;margin-top:24px;position:relative;z-index:2}
    .check-item{display:flex;gap:12px;align-items:flex-start;font-weight:700}
    .check-item i{color:var(--yellow);margin-top:3px}

    .process{background:#fff7f7}
